<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>2026-2027年 税金シミュレーター (令和8年対応版)</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Noto+Sans+JP:wght@300;400;500;600;700;900&family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

    <script type="importmap">
    {
        "imports": {
            "react": "https://esm.sh/react@18.2.0",
            "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
            "lucide-react": "https://esm.sh/lucide-react@0.292.0"
        }
    }
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Noto Sans JP', 'Inter', 'sans-serif'],
                        display: ['Outfit', 'Inter', 'sans-serif'],
                        mono: ['JetBrains Mono', 'SF Mono', 'Consolas', 'monospace'],
                    }
                }
            }
        }
    </script>
    <style>
        input[type="number"]::-webkit-outer-spin-button,
        input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        input[type="number"] { -moz-appearance: textfield; }
        details summary::-webkit-details-marker { display: none; }
        details summary { list-style: none; }

        /* 印刷用スタイル */
        @media print {
            body { background: white !important; }
            #root { display: none !important; }
            #pdf-output { display: block !important; }
        }
        #pdf-output { display: none; }
    </style>
</head>
<body class="bg-neutral-50 text-neutral-900 antialiased">
    <div id="root"></div>
    <div id="pdf-output"></div>

    <script type="text/babel" data-type="module">
        import React, { useState } from 'react';
        import { createRoot } from 'react-dom/client';
        import { ChevronDown } from 'lucide-react';

        const App = () => {
            // --- 収入 ---
            const [salary, setSalary] = useState(6000000);
            const [dividendIncome, setDividendIncome] = useState(0);
            const [businessIncome, setBusinessIncome] = useState(0);
            const [miscIncome, setMiscIncome] = useState(0);

            // --- 基本情報 ---
            const [age, setAge] = useState(30);
            const [socialInsuranceManual, setSocialInsuranceManual] = useState(null);
            const [isSocialManual, setIsSocialManual] = useState(false);

            // --- 配偶者 ---
            const [spouse, setSpouse] = useState('none'); // none, general, elderly
            const [spouseIncome, setSpouseIncome] = useState(0);

            // --- 扶養 ---
            const [childrenGeneral, setChildrenGeneral] = useState(0);   // 一般扶養 (16-18, 23-69)
            const [childrenStudent, setChildrenStudent] = useState(0);   // 特定扶養 (19-22)
            const [children, setChildren] = useState(0);                 // 16歳未満
            const [elderlyDependentCohabit, setElderlyDependentCohabit] = useState(0);   // 老人扶養（同居）
            const [elderlyDependentOther, setElderlyDependentOther] = useState(0);       // 老人扶養（非同居）

            // --- 各種所得控除 ---
            const [ideco, setIdeco] = useState(0);
            const [lifeInsurance, setLifeInsurance] = useState(0);
            const [earthquakeInsurance, setEarthquakeInsurance] = useState(0);
            const [medicalExpense, setMedicalExpense] = useState(0);       // 医療費（年間支払額）
            const [casualtyLoss, setCasualtyLoss] = useState(0);           // 雑損控除額（算出済み）
            const [donationAmount, setDonationAmount] = useState(0);       // 寄附金額（ふるさと納税等）

            // --- 人的控除フラグ ---
            const [isSingleParent, setIsSingleParent] = useState(false);   // ひとり親控除
            const [isWidow, setIsWidow] = useState(false);                 // 寡婦控除
            const [isWorkingStudent, setIsWorkingStudent] = useState(false); // 勤労学生控除
            const [disabilityType, setDisabilityType] = useState('none');   // none, general, special, specialCohabit

            // --- 税額控除 ---
            const [housingLoanCredit, setHousingLoanCredit] = useState(0); // 住宅ローン控除額

            // --- 基礎控除設定 ---
            const [deductionMode, setDeductionMode] = useState('current');
            const [basicDeductionManualIncome, setBasicDeductionManualIncome] = useState(580000);
            const [basicDeductionManualResident, setBasicDeductionManualResident] = useState(530000);

            const presets = {
                current: { label: '令和8年分 現行法 (2026年)', income: 580000, resident: 530000 },
                manual: { label: 'カスタム設定', income: 580000, resident: 530000 }
            };

            const handleModeChange = (mode) => {
                setDeductionMode(mode);
                if (mode !== 'manual') {
                    setBasicDeductionManualIncome(presets[mode].income);
                    setBasicDeductionManualResident(presets[mode].resident);
                }
            };

            // ========================================
            // Calculation Logic
            // ========================================

            // 給与所得控除
            const calcSalaryDeduction = (g) => {
                if (g < 650000) return g; // 全額控除で所得0
                if (g <= 1900000) return 650000;
                if (g <= 3600000) return g * 0.3 + 80000;
                if (g <= 6600000) return g * 0.2 + 440000;
                if (g <= 8500000) return g * 0.1 + 1100000;
                return 1950000;
            };

            // 所得金額調整控除
            const calcIncomeAdjustment = (g) => {
                if (g <= 8500000) return 0;
                const hasDep = (children + childrenGeneral + childrenStudent + elderlyDependentCohabit + elderlyDependentOther) > 0;
                const hasDisability = disabilityType !== 'none';
                if (!hasDep && !hasDisability) return 0;
                return (Math.min(g, 10000000) - 8500000) * 0.1;
            };

            const salaryDeduction = calcSalaryDeduction(salary);
            const salaryIncomeRaw = Math.max(0, salary - salaryDeduction);
            const incomeAdjustment = calcIncomeAdjustment(salary);
            const salaryIncome = Math.max(0, salaryIncomeRaw - incomeAdjustment);
            const totalIncome = salaryIncome + dividendIncome + businessIncome + miscIncome;

            // 社会保険料
            const calcSocialInsurance = () => {
                if (isSocialManual && socialInsuranceManual !== null) return parseInt(socialInsuranceManual);
                const pensionRate = 0.0915;
                const healthRate = (age >= 40 && age < 65) ? 0.067 : 0.05;
                const employmentRate = 0.006;
                return Math.floor(
                    Math.min(salary * pensionRate, 750000) +
                    Math.min(salary * healthRate, 1000000) +
                    salary * employmentRate
                );
            };
            const socialInsurance = calcSocialInsurance();

            // 基礎控除
            const calcBasicDeduction = (income, isResident) => {
                if (deductionMode === 'manual') return isResident ? basicDeductionManualResident : basicDeductionManualIncome;
                const diff = isResident ? 50000 : 0;
                if (income <= 1320000) return 950000 - diff;
                if (income <= 3360000) return 880000 - diff;
                if (income <= 4890000) return 680000 - diff;
                if (income <= 6550000) return 630000 - diff;
                if (income <= 23500000) return 580000 - diff;
                if (income <= 24000000) return 480000 - diff;
                if (income <= 24500000) return 320000 - diff + (isResident ? 20000 : 0);
                if (income <= 25000000) return 160000 - diff + (isResident ? 40000 : 0);
                return 0;
            };

            // 配偶者の合計所得
            const calcSpouseIncome = () => {
                if (spouse === 'none') return 0;
                const s = spouseIncome;
                return Math.max(0, s - calcSalaryDeduction(s));
            };
            const spouseTotalIncome = calcSpouseIncome();

            // 配偶者控除・配偶者特別控除
            const calcSpouseDeduction = (isResident) => {
                if (spouse === 'none' || totalIncome > 10000000) return 0;
                const si = spouseTotalIncome;
                const isE = spouse === 'elderly';
                if (si <= 480000) {
                    const b = isResident
                        ? (isE ? [380000, 260000, 130000] : [330000, 220000, 110000])
                        : (isE ? [480000, 320000, 160000] : [380000, 260000, 130000]);
                    return totalIncome <= 9000000 ? b[0] : totalIncome <= 9500000 ? b[1] : b[2];
                }
                if (si > 1330000) return 0;
                const tbl = isResident ? [
                    [950000,330000,220000,110000],[1000000,330000,220000,110000],
                    [1050000,310000,210000,110000],[1100000,260000,180000,90000],
                    [1150000,210000,140000,70000],[1200000,160000,110000,60000],
                    [1250000,110000,80000,40000],[1300000,60000,40000,20000],
                    [1330000,30000,20000,10000],
                ] : [
                    [950000,380000,260000,130000],[1000000,360000,240000,120000],
                    [1050000,310000,210000,110000],[1100000,260000,180000,90000],
                    [1150000,210000,140000,70000],[1200000,160000,110000,60000],
                    [1250000,110000,80000,40000],[1300000,60000,40000,20000],
                    [1330000,30000,20000,10000],
                ];
                const col = totalIncome <= 9000000 ? 1 : totalIncome <= 9500000 ? 2 : 3;
                for (const r of tbl) { if (si <= r[0]) return r[col]; }
                return 0;
            };

            // 扶養控除
            const calcDependentDeduction = (isResident) => {
                let d = 0;
                d += childrenGeneral * (isResident ? 330000 : 380000);
                d += childrenStudent * (isResident ? 450000 : 630000);
                d += elderlyDependentCohabit * (isResident ? 450000 : 580000);
                d += elderlyDependentOther * (isResident ? 380000 : 480000);
                return d;
            };

            // 障害者控除
            const calcDisabilityDeduction = (isResident) => {
                if (disabilityType === 'none') return 0;
                if (disabilityType === 'general') return isResident ? 260000 : 270000;
                if (disabilityType === 'special') return isResident ? 300000 : 400000;
                if (disabilityType === 'specialCohabit') return isResident ? 530000 : 750000;
                return 0;
            };

            // ひとり親控除・寡婦控除
            const calcSingleParentWidow = (isResident) => {
                if (isSingleParent) return isResident ? 300000 : 350000;
                if (isWidow) return isResident ? 260000 : 270000;
                return 0;
            };

            // 勤労学生控除
            const calcWorkingStudent = (isResident) => {
                if (!isWorkingStudent) return 0;
                return isResident ? 260000 : 270000;
            };

            // 医療費控除
            const calcMedicalDeduction = () => {
                if (medicalExpense <= 0) return 0;
                const threshold = Math.min(totalIncome * 0.05, 100000);
                return Math.min(Math.max(0, medicalExpense - threshold), 2000000);
            };

            // 寄附金控除（所得控除）
            const calcDonationDeduction = () => {
                if (donationAmount <= 0) return 0;
                return Math.max(0, Math.min(donationAmount, totalIncome * 0.4) - 2000);
            };

            const medicalDeduction = calcMedicalDeduction();
            const donationDeduction = calcDonationDeduction();

            // --- 所得控除合計 ---
            const calcTotalDeduction = (isResident) => {
                return socialInsurance
                    + calcBasicDeduction(totalIncome, isResident)
                    + calcSpouseDeduction(isResident)
                    + calcDependentDeduction(isResident)
                    + calcDisabilityDeduction(isResident)
                    + calcSingleParentWidow(isResident)
                    + calcWorkingStudent(isResident)
                    + ideco + lifeInsurance + earthquakeInsurance
                    + medicalDeduction
                    + casualtyLoss
                    + donationDeduction;
            };

            const basicDeductionIncome = calcBasicDeduction(totalIncome, false);
            const basicDeductionResident = calcBasicDeduction(totalIncome, true);
            const spouseDeductionIncome = calcSpouseDeduction(false);
            const spouseDeductionResident = calcSpouseDeduction(true);
            const dependentDeductionIncome = calcDependentDeduction(false);
            const dependentDeductionResident = calcDependentDeduction(true);
            const disabilityDeductionIncome = calcDisabilityDeduction(false);
            const disabilityDeductionResident = calcDisabilityDeduction(true);
            const singleParentWidowIncome = calcSingleParentWidow(false);
            const singleParentWidowResident = calcSingleParentWidow(true);
            const workingStudentIncome = calcWorkingStudent(false);
            const workingStudentResident = calcWorkingStudent(true);

            const totalDeductionIncome = calcTotalDeduction(false);
            const totalDeductionResident = calcTotalDeduction(true);

            const taxableIncomeIncomeTax = Math.max(0, Math.floor((totalIncome - totalDeductionIncome) / 1000) * 1000);
            const taxableIncomeResidentTax = Math.max(0, Math.floor((totalIncome - totalDeductionResident) / 1000) * 1000);

            // --- 税率 ---
            const getRate = (t) => { if(t<=1950000)return .05;if(t<=3300000)return .1;if(t<=6950000)return .2;if(t<=9000000)return .23;if(t<=18000000)return .33;if(t<=40000000)return .4;return .45; };
            const getDeduction = (t) => { if(t<=1950000)return 0;if(t<=3300000)return 97500;if(t<=6950000)return 427500;if(t<=9000000)return 636000;if(t<=18000000)return 1536000;if(t<=40000000)return 2796000;return 4796000; };
            const calcTaxBase = (t) => { if(t<=1950000)return t*.05;if(t<=3300000)return t*.1-97500;if(t<=6950000)return t*.2-427500;if(t<=9000000)return t*.23-636000;if(t<=18000000)return t*.33-1536000;if(t<=40000000)return t*.4-2796000;return t*.45-4796000; };

            const calcDivDeduction = (div, taxable, r10, r5) => {
                if (div <= 0) return 0;
                if (taxable <= 10000000) return div * r10;
                const o = Math.max(0, taxable - div);
                if (o >= 10000000) return div * r5;
                const u = 10000000 - o;
                return u * r10 + (div - u) * r5;
            };

            const incomeTaxRate = getRate(taxableIncomeIncomeTax);
            const incomeTaxDeduction = getDeduction(taxableIncomeIncomeTax);
            const incomeTaxBase = calcTaxBase(taxableIncomeIncomeTax);
            const divDeductionIncome = calcDivDeduction(dividendIncome, taxableIncomeIncomeTax, 0.10, 0.05);

            let standardIncomeTax = Math.max(0, incomeTaxBase - divDeductionIncome);
            let reconstructionTax = Math.floor(standardIncomeTax * 0.021);

            // 住宅ローン控除（所得税から控除）
            let incomeTaxAfterHousing = Math.max(0, standardIncomeTax + reconstructionTax - housingLoanCredit);
            let finalIncomeTax = Math.floor(incomeTaxAfterHousing / 100) * 100;

            // 住宅ローン控除の所得税で引ききれなかった分 → 住民税から控除（上限あり）
            const housingLoanUsedIncome = Math.min(housingLoanCredit, standardIncomeTax + reconstructionTax);
            const housingLoanRemainder = housingLoanCredit - housingLoanUsedIncome;
            const housingLoanResidentMax = Math.min(taxableIncomeIncomeTax * 0.05, 97500);
            const housingLoanResidentCredit = Math.min(housingLoanRemainder, housingLoanResidentMax);

            const residentTaxRateBase = taxableIncomeResidentTax * 0.10;
            const divDeductionResident = calcDivDeduction(dividendIncome, taxableIncomeResidentTax, 0.028, 0.014);
            let residentIncomeBased = Math.max(0, residentTaxRateBase - divDeductionResident);
            let adjustmentDeduction = totalIncome > 25000000 ? 0 : 2500;
            residentIncomeBased = Math.max(0, residentIncomeBased - adjustmentDeduction);

            // 住民税から住宅ローン控除
            residentIncomeBased = Math.max(0, residentIncomeBased - housingLoanResidentCredit);

            const perCapitaTax = 5000;
            let finalResidentTax = residentIncomeBased + perCapitaTax;

            const totalGross = salary + dividendIncome + businessIncome + miscIncome;
            const takeHome = totalGross - socialInsurance - finalIncomeTax - finalResidentTax;
            const totalTaxBurden = socialInsurance + finalIncomeTax + finalResidentTax;
            const burdenRate = totalGross > 0 ? ((totalTaxBurden / totalGross) * 100).toFixed(1) : 0;

            // ふるさと納税上限
            const calcFurusatoLimit = () => {
                const r = getRate(taxableIncomeIncomeTax);
                const d = 0.9 - (r * 1.021);
                if (d <= 0) return 0;
                // 住宅ローン控除後の所得割額を使用
                return Math.floor(((residentIncomeBased * 0.2) / d + 2000) / 1000) * 1000;
            };
            const furusatoLimit = calcFurusatoLimit();

            // --- PDF Export (window.print方式) ---
            const handlePdfExport = () => {
                const today = new Date().toLocaleDateString('ja-JP');
                const f = (n) => new Intl.NumberFormat('ja-JP', { style: 'currency', currency: 'JPY' }).format(n);

                const r = (label, value, bold, dim) =>
                    `<tr${bold ? ' style="border-top:1px solid #ccc;"' : ''}>
                        <td style="padding:${bold?5:2}px 0;font-size:${bold?11:10}px;color:${bold?'#111':'#666'};font-weight:${bold?600:400};">${label}</td>
                        <td style="padding:${bold?5:2}px 0;text-align:right;font-family:Consolas,monospace;font-size:10px;color:${dim?'#aaa':bold?'#111':'#444'};font-weight:${bold?700:400};">${value}</td>
                    </tr>`;
                const d = (label, val) => val > 0 ? r(label, f(val), false, false) : '';
                const sec = (t) => `<tr><td colspan="2" style="font-size:9px;font-weight:700;color:#999;letter-spacing:2px;text-transform:uppercase;padding:8px 0 4px;border-bottom:1px solid #ddd;">${t}</td></tr>`;

                const deductionRows = (isR) => {
                    const g = (a, b) => isR ? b : a;
                    return d('基礎控除', g(basicDeductionIncome, basicDeductionResident)) +
                        d('社会保険料', socialInsurance) +
                        d('配偶者控除', g(spouseDeductionIncome, spouseDeductionResident)) +
                        d('扶養控除', g(dependentDeductionIncome, dependentDeductionResident)) +
                        d('障害者控除', g(disabilityDeductionIncome, disabilityDeductionResident)) +
                        d('ひとり親・寡婦', g(singleParentWidowIncome, singleParentWidowResident)) +
                        d('勤労学生', g(workingStudentIncome, workingStudentResident)) +
                        d('iDeCo等', ideco) + d('生命保険料', lifeInsurance) +
                        d('地震保険料', earthquakeInsurance) + d('医療費控除', medicalDeduction) +
                        d('雑損控除', casualtyLoss) + d('寄附金控除', donationDeduction) +
                        r('控除合計', '-' + f(isR ? totalDeductionResident : totalDeductionIncome), false, true) +
                        r('課税所得', f(isR ? taxableIncomeResidentTax : taxableIncomeIncomeTax), true, false);
                };

                const el = document.getElementById('pdf-output');
                el.innerHTML = `
                <div style="font-family:'Noto Sans JP',Helvetica,Arial,sans-serif;color:#111;padding:24px 28px;max-width:100%;">
                    <div style="margin-bottom:20px;">
                        <div style="font-size:8px;letter-spacing:3px;color:#aaa;text-transform:uppercase;margin-bottom:2px;">Tax Simulation Report</div>
                        <div style="font-size:18px;font-weight:800;">税金シミュレーション結果</div>
                        <div style="font-size:9px;color:#aaa;">令和8年分 (2026年) ／ 出力日: ${today}</div>
                    </div>

                    <table style="width:100%;border-collapse:separate;border-spacing:10px 0;margin:0 -10px 16px -10px;"><tr>
                        <td style="width:50%;background:#111;color:#fff;border-radius:8px;padding:14px;">
                            <div style="font-size:8px;color:#999;margin-bottom:2px;">手取り年収（概算）</div>
                            <div style="font-size:22px;font-weight:700;font-family:Consolas,monospace;">${f(takeHome)}</div>
                            <div style="font-size:9px;color:#666;font-family:Consolas,monospace;margin-top:2px;">月額 ${f(Math.round(takeHome / 12))}</div>
                        </td>
                        <td style="width:50%;border:1px solid #ccc;border-radius:8px;padding:14px;">
                            <div style="font-size:8px;color:#999;margin-bottom:2px;">ふるさと納税 限度額目安</div>
                            <div style="font-size:22px;font-weight:700;font-family:Consolas,monospace;">${f(furusatoLimit)}</div>
                            <div style="font-size:9px;color:#999;margin-top:2px;">自己負担2,000円で済む上限</div>
                        </td>
                    </tr></table>

                    <table style="width:100%;border-collapse:collapse;margin-bottom:12px;">
                        ${sec('Breakdown — 税金・社会保険料')}
                        ${r('社会保険料', f(socialInsurance))}${r('所得税', f(finalIncomeTax))}${r('住民税', f(finalResidentTax))}
                        ${r('負担合計', f(totalTaxBurden), true)}${r('負担率', burdenRate + '%', true)}
                    </table>

                    <table style="width:100%;border-collapse:collapse;margin-bottom:12px;">
                        ${sec('Step 1 — 所得の計算')}
                        ${r('給与収入', f(salary))}
                        ${r('給与所得控除 + 調整控除', '-' + f(salary - salaryIncome), false, true)}
                        ${r('給与所得', f(salaryIncome))}
                        ${(dividendIncome > 0 || businessIncome > 0 || miscIncome > 0) ? r('他所得計', f(dividendIncome + businessIncome + miscIncome)) : ''}
                        ${r('総所得金額', f(totalIncome), true)}
                    </table>

                    <table style="width:100%;border-collapse:separate;border-spacing:10px 0;margin:0 -10px 12px -10px;"><tr>
                        <td style="width:50%;vertical-align:top;"><table style="width:100%;border-collapse:collapse;">${sec('Step 2 — 所得税控除')}${deductionRows(false)}</table></td>
                        <td style="width:50%;vertical-align:top;"><table style="width:100%;border-collapse:collapse;">${sec('Step 2 — 住民税控除')}${deductionRows(true)}</table></td>
                    </tr></table>

                    <table style="width:100%;border-collapse:separate;border-spacing:10px 0;margin:0 -10px 12px -10px;"><tr>
                        <td style="width:50%;vertical-align:top;"><table style="width:100%;border-collapse:collapse;">
                            ${sec('Step 3 — 所得税')}
                            ${r('税率', Math.round(incomeTaxRate * 100) + '%')}
                            ${dividendIncome > 0 ? r('配当控除', '-' + f(divDeductionIncome), false, true) : ''}
                            ${r('基準所得税額', f(standardIncomeTax))}
                            ${r('復興特別所得税', '+' + f(reconstructionTax))}
                            ${housingLoanCredit > 0 ? r('住宅ローン控除', '-' + f(housingLoanUsedIncome), false, true) : ''}
                            ${r('申告所得税額', f(finalIncomeTax), true)}
                        </table></td>
                        <td style="width:50%;vertical-align:top;"><table style="width:100%;border-collapse:collapse;">
                            ${sec('Step 3 — 住民税')}
                            ${r('税率', '10%')}
                            ${dividendIncome > 0 ? r('配当控除', '-' + f(divDeductionResident), false, true) : ''}
                            ${r('調整控除', '-' + f(adjustmentDeduction), false, true)}
                            ${housingLoanResidentCredit > 0 ? r('住宅ローン控除', '-' + f(housingLoanResidentCredit), false, true) : ''}
                            ${r('所得割額', f(residentIncomeBased))}
                            ${r('均等割額', '+' + f(perCapitaTax))}

                                                    <h4 className="text-sm font-bold tracking-wide text-neutral-700 uppercase mb-4 font-display">Step 4 &mdash; ふるさと納税</h4>
                                                    <Row label="住民税所得割額" value={fmtYen(residentIncomeBased)} sub />
                                                    <Row label="所得税率" value={`${Math.round(getRate(taxableIncomeIncomeTax) * 100)}%`} sub />
                                                    <Row label="上限額" value={fmtYen(furusatoLimit)} bold border />
                                                    <p className="text-[11px] text-neutral-400 mt-3 leading-relaxed">
                                                        住宅ローン控除や医療費控除がある場合、上限額が変動します。
                                                    </p>
                                                </div>
                                            </div>
                                        </details>
                                    </section>

                                    {/* PDF出力ボタン */}
                                    <button onClick={() => handlePdfExport()}
                                        className="w-full py-3 px-4 border border-neutral-200 rounded-xl text-sm font-medium text-neutral-600 hover:bg-neutral-100 hover:border-neutral-300 transition-colors">
                                        PDF で保存（A4）
                                    </button>

                                    <p className="text-[11px] text-neutral-400 leading-relaxed px-2">
                                        このシミュレーションは概算です。事業所得がある場合の国保計算、分離課税との損益通算等は個別の事情により異なります。
                                    </p>
                                </div>
                            </div>
                        </div>

                        <footer className="mt-16 md:mt-24 pb-8 text-center">
                            <p className="text-[11px] text-neutral-300 tracking-widest font-display uppercase">Tax Simulator &mdash; 令和8年対応</p>
                        </footer>
                    </div>
                </div>
            );
        };

        createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
